# ================================================================
#  application.properties
#
#  This is the CONFIG FILE for your Spring Boot app.
#  Think of it like the "settings" panel of your application.
#  You change things here WITHOUT touching any Java code.
# ================================================================


# ── SERVER ────────────────────────────────────────────────────────
# The port your backend runs on.
# Your frontend runs on 5173, so we use 8080 for the backend.
# API calls will go to: http://localhost:8080/api/...
server.port=8080


# ── MONGODB ───────────────────────────────────────────────────────
# The connection string for your MongoDB database.
#
# Format:  mongodb://<host>:<port>/<database-name>
#
# - localhost   = MongoDB is running on your own computer
# - 27017       = MongoDB's default port
# - chatapp     = the name of the database (MongoDB creates it automatically
#                 if it doesn't exist — no setup needed!)
#
# IMPORTANT: Make sure MongoDB is installed and running before you start the app.
# Download from: https://www.mongodb.com/try/download/community
# LOCAL MongoDB (commented out)
# spring.data.mongodb.uri=mongodb://localhost:27017/chatapp

# ATLAS MongoDB (active)
spring.data.mongodb.uri=mongodb+srv://springchat:Spring2026@cluster0.95lwtsy.mongodb.net/chatapp?appName=Cluster0


# ── JWT (JSON Web Token) ──────────────────────────────────────────
# jwt.secret = a long, random, SECRET string used to SIGN the token.
#              Think of it like the school's official stamp — only YOUR
#              server knows this secret, so only you can create valid tokens.
#
# IMPORTANT: In a real project, NEVER commit this to GitHub!
#            Use environment variables instead (we'll keep it here for learning).
#
# This is a Base64-encoded string. It must be at least 256 bits (32 chars) long.
jwt.secret=Y2hhdGFwcC1zdXBlci1zZWNyZXQta2V5LWZvci1qd3Qtc2lnbmluZy0yMDI2

# jwt.expiration = how many MILLISECONDS the token is valid for.
# SRS says: "sessions expire after 30 minutes of inactivity"
# 30 minutes = 30 × 60 × 1000 = 1,800,000 milliseconds
jwt.expiration=86400000


# ── FILE UPLOAD ───────────────────────────────────────────────────
# Max file size allowed for uploads (10 MB as per API docs)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Folder where uploaded files are saved on disk (relative to where you run the app)
app.upload.dir=uploads

# Base URL of this server — used to build the file download URL
app.base-url=http://localhost:8080


# ── LOGGING ───────────────────────────────────────────────────────
# Shows our app's debug messages in the console.
# Helpful while developing — you can see what's happening step by step.
logging.level.com.chatapp=DEBUG
logging.level.org.springframework.security=WARN
